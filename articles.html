<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>文章 · 影顿驿站</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/cover.svg">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main">
    <header class="main__header" id="mainHeader"></header>
    <div id="listContent" class="loading">载入中</div>
  </main>

  <div id="modalRoot"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/modal.js"></script>
  <script src="assets/js/list-page.js"></script>
  <script>
    (async function () {
      ShadonCommon.bootstrap('articles', {
        title: '文章',
        subtitle: 'Articles · 文字内容合辑',
        hint: '包含介绍、杂谈等文章',
      });
      try {
        const data = await ShadonData.loadJSON('assets/data/articles.json');
        window.__articles = data || [];
        ShadonList.render({
          container: '#listContent',
          data: data || [],
          kind: 'article',
          seriesDescriptions: {
            '介绍': '介绍类文章'
          },
        });
      } catch (e) {
        // 异常兜底：data.js 已统一返回空数组，此处按空数据渲染
        const host = document.getElementById('listContent');
        if (host) {
          host.classList.remove('loading');
          window.__articles = [];
          ShadonList.render({ container: '#listContent', data: [], kind: 'article' });
        }
      }
    })();
  </script>
</body>
</html>
