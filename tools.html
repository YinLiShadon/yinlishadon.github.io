<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>工具 · 影顿驿站</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/avatar.svg">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main">
    <header class="main__header" id="mainHeader"></header>
    <div id="listContent" class="loading">载入中</div>
  </main>

  <div id="modalRoot"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/modal.js"></script>
  <script src="assets/js/list-page.js"></script>
  <script>
    (async function () {
      ShadonCommon.bootstrap('tools', {
        title: '工具',
        subtitle: 'Tools · 实用小工具合集',
        hint: '本人(?)制作的工具',
      });
      try {
        const data = await ShadonData.loadJSON('assets/data/tools.json');
        window.__tools = data || [];
        ShadonList.render({ container: '#listContent', data: data || [], kind: 'tool' });
      } catch (e) {
        // 异常兜底：data.js 已统一返回空数组，此处按空数据渲染
        const host = document.getElementById('listContent');
        if (host) {
          host.classList.remove('loading');
          window.__tools = [];
          ShadonList.render({ container: '#listContent', data: [], kind: 'tool' });
        }
      }
    })();
  </script>
</body>
</html>
